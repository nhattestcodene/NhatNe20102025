<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8/03</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
}

/* ENVELOPE */
.envelope {
  position: relative;
  width: 260px;
  height: 160px;
  background: #ff6b81;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: opacity 1.5s ease;
}

.envelope::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom right, #ff758c, #ff7eb3);
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  top: 0;
  left: 0;
  border-radius: 6px 6px 0 0;
}

.envelope.hide {
  opacity: 0;
  pointer-events: none;
}

/* SEAL */
.seal-heart {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
  animation: pulse 1.4s infinite;
}

@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

/* LETTER */
.letter {
  position: absolute;
  width: 0;
  height: 0;
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  padding: 0;
  overflow: hidden;
  opacity: 0;
  text-align: center;
  transform: scale(0.3) translateY(100px);
  transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.letter.show {
  width: 350px;
  height: 270px;
  opacity: 1;
  transform: scale(1) translateY(-150px);
  padding: 25px;
}

/* CLOSE BUTTON */
.close-btn {
  position: absolute;
  top: 8px;
  right: 10px;
  background: rgba(255, 107, 129, 0.9);
  border: none;
  color: #fff;
  font-size: 16px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.2s;
  z-index: 20;
}

.close-btn:hover {
  transform: scale(1.15);
  background: #ff4757;
}

/* CONTENT */
h2 {
  color: #ff6b81;
  font-size: 22px;
  margin-bottom: 10px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.letter.show h2 {
  opacity: 1;
  transform: translateY(0);
}

.message {
  color: #444;
  font-size: 16px;
  line-height: 1.6;
  opacity: 0;
  transform: translateY(20px);
  transition: 1.5s ease;
}

.letter.show .message {
  opacity: 1;
  transform: translateY(0);
}

.signature {
  font-family: 'Brush Script MT', cursive;
  font-size: 22px;
  color: #ff6b81;
  position: absolute;
  bottom: 15px;
  right: 25px;
  opacity: 0;
  transition: 1.5s ease;
}

.letter.show .signature {
  opacity: 1;
}

/* HEART */
.heart {
  position: absolute;
  bottom: -10px;
  color: rgba(255, 100, 130, 0.7);
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}

/* GIF */
.corner-gif {
  position: absolute;
  width: 85px;
  pointer-events: none;
}

.left-gif {
  top: 5px;
  left: 10px;
}
</style>
</head>

<body>

<div class="envelope" id="envelope">
  <div class="seal-heart">🥰</div>
</div>

<div class="letter" id="letter">
  <button class="close-btn" id="closeBtn">✖</button>

  <img src="mewmew.gif" class="corner-gif left-gif">

  <h2>🎉 8/03 Zui Zẻ🖕</h2>
  <div class="message">
    Chào Bạn Gì Nha À thì ...
    8/03 mìn chúc bạn càng ngày càng xin đẹp
    Thành Công Trong cuộc sống 
    Và cuoiis cùng là ế đến năm 40 tuổi
    Thôi đùa á Click vào dấu X có bất ngờ nè hì
  </div>

  <div class="signature">— Nhật Nè ✍️</div>
</div>

<audio id="music" loop>
  <source src="https://nhattestcodene.github.io/Music/beta.mp3" type="audio/mpeg">
</audio>

<script>
const envelope = document.getElementById("envelope");
const letter = document.getElementById("letter");
const music = document.getElementById("music");
const closeBtn = document.getElementById("closeBtn");

envelope.addEventListener("click", () => {
  envelope.classList.add("hide");
  letter.classList.add("show");
  music.play().catch(()=>{});
});

closeBtn.addEventListener("click", () => {
  music.pause();
  music.currentTime = 0;
  letter.classList.remove("show");
  setTimeout(() => {
    window.location.href = "https://nhatne207.vercel.app/";
  }, 300);
});

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.textContent = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 600);
</script>

</body>
</html>
